# Shellyxz shell kernel ontology — SN-O0 Phase 1 (path + boundary + load order)
# Canonical graph. Verification file paths deferred until after SN-4a (SN-O1).
meta:
  version: "1.0"
  project: shellyxz-shell
  layout: plugins_verification
  layout_variant: sn4_4a
  boundary_note: >
    Verification implementation under plugins/verification/; bin/* shims stable.
    Per-project cockpit manifests remain at .agents/verification/ in each repo.
  last_updated: "2026-06-22"

nodes:
  # --- Domains ---
  - id: shellyxz:PathContractDomain
    type: Domain
    name: Path Contract Domain
    subgraph: path
    stability_score: 92
    fused_summary: >
      Declarative PATH build from path.contract layers (core, local, project phase)
      via path_contract_apply; runtime verify via path_contract_verify; lexicon ties
      contract line syntax to readable local variable names.
    source_refs:
      - core/path.contract
      - core/path-resolve.sh
      - arch-design/shell-script-readability.md

  - id: shellyxz:KernelPluginBoundary
    type: Domain
    name: Kernel vs Verification Plugin Boundary
    subgraph: boundary
    stability_score: 90
    fused_summary: >
      Two products in one tree: portable kernel (PATH, migrate, recover) and optional
      verification plugin (ab/av/at, tmux, cockpit). Kernel public hooks only; plugin
      must not change load order or require kernel deps.
    source_refs:
      - PLUGIN.md
      - arch-design/architecture.md

  - id: shellyxz:LoadOrder
    type: Domain
    name: Shell Load Order
    subgraph: load_order
    stability_score: 88
    fused_summary: >
      login/profile → env.sh path_contract_apply (core then local) → presets →
      tool hooks → direnv phase:project → path_contract_reassert at zshrc tail.
    source_refs:
      - arch-design/shell.md
      - core/env.sh

  # --- Boundaries ---
  - id: shellyxz:Kernel
    type: Boundary
    name: Kernel
    subgraph: boundary
    must_not:
      - Hardcode agent vendor CLIs (grok, cursor agent)
      - Require tmux, Python, nvim, or Cursor for source ~/.zshrc
      - Put machine-specific PATH in core/path.contract
      - Change verification semantics without PLUGIN.md update
    source_refs:
      - PLUGIN.md
      - core/env.sh

  - id: shellyxz:VerificationPlugin
    type: Boundary
    name: Verification Plugin
    subgraph: boundary
    may_assume:
      - tmux session; not editor integrated terminal
      - Optional tools lazygit bat fzf yazi difftastic rg dust
      - Per-project cockpit manifests (.agents/verification/, cockpit.yaml)
      - SHELL_AGENT_BUILD_CMD via env (not hardcoded in kernel)
      - SHELL_AGENT_STRICT_PATH or ab --strict for core-only PATH
    must_not:
      - Change kernel load order without check-shell.sh update
      - Add required kernel dependencies (e.g. Python mandatory for zshrc)
    source_refs:
      - PLUGIN.md
      - arch-design/VERIFICATION.md

  # --- Public hooks ---
  - id: shellyxz:PublicHook_verify_workflow_root
    type: Hook
    name: verify_workflow_root
    file: core/functions.sh
    signature: verify_workflow_root() — git-aware project root
    source_refs:
      - PLUGIN.md
      - core/functions.sh

  - id: shellyxz:PublicHook_SHELL_ROOT
    type: Hook
    name: SHELL_ROOT / SHELL_CONFIG_BIN
    signature: Paths to ~/.config/shell
    source_refs:
      - PLUGIN.md
      - core/env.sh

  - id: shellyxz:PublicHook_detect_editor_terminal
    type: Hook
    name: detect_editor_terminal
    file: core/functions.sh
    signature: SHELL_IN_EDITOR_TERMINAL — skip broken integrated terminals
    source_refs:
      - PLUGIN.md
      - core/functions.sh

  # --- PATH concepts ---
  - id: shellyxz:PathContract
    type: Concept
    name: Path Contract File
    syntax: "path.contract v2 declarative lines"
    lexicon_vars: [contract_file_path, contract_line]
    source_refs:
      - core/path.contract
      - arch-design/shell-script-readability.md

  - id: shellyxz:PathPhase
    type: Concept
    name: Path Phase
    syntax: "phase:environment | phase:core | phase:inherit | phase:append | phase:project"
    lexicon_vars: [phase_name, phase_filter]
    source_refs:
      - core/path.contract
      - core/path-resolve.sh

  - id: shellyxz:ContractLine_prepend
    type: Concept
    name: prepend line
    syntax: "prepend:TOKEN or prepend:TOKEN:environment_gate"
    lexicon_vars: [path_token, resolved_directory, environment_gate, pending_prepend_dirs]
    source_refs:
      - core/path.contract
      - arch-design/shell-script-readability.md

  - id: shellyxz:ContractLine_append
    type: Concept
    name: append line
    syntax: "append:TOKEN"
    lexicon_vars: [path_token, resolved_directory]
    source_refs:
      - core/path.contract
      - arch-design/shell-script-readability.md

  - id: shellyxz:ContractLine_deny
    type: Concept
    name: deny line
    syntax: "deny:PATTERN"
    lexicon_vars: [deny_pattern, resolved_directory]
    source_refs:
      - core/path.contract
      - arch-design/shell-script-readability.md

  - id: shellyxz:EnvironmentGate
    type: Concept
    name: Environment Gate
    syntax: "prepend:TOKEN:omarchy — third field gates on preset"
    lexicon_vars: [environment_gate]
    source_refs:
      - core/path-resolve.sh
      - arch-design/shell-script-readability.md

  - id: shellyxz:ReadabilityLexicon
    type: Concept
    name: PATH Readability Lexicon
    documented_in:
      - arch-design/shell-script-readability.md
      - .cursor/rules/shell-readability.mdc
    source_refs:
      - arch-design/shell-script-readability.md
      - .cursor/rules/shell-readability.mdc

  # --- PATH artifacts (layers) ---
  - id: shellyxz:Artifact_core_path_contract
    type: Artifact
    name: core/path.contract
    path: core/path.contract
    role: Forkable PATH defaults; no personal toolchains
    source_refs:
      - core/path.contract
      - arch-design/architecture.md

  - id: shellyxz:Artifact_local_path_contract
    type: Artifact
    name: local/path.contract
    path: local/path.contract
    role: Machine overlay; wins which over core; no project repo paths
    source_refs:
      - local/path.contract.example
      - arch-design/architecture.md

  - id: shellyxz:Artifact_project_path_contract
    type: Artifact
    name: repo .path.contract
    path: .path.contract
    role: phase:project only; direnv-scoped; must not replace global contract
    source_refs:
      - .path.contract.example
      - arch-design/shell.md

  - id: shellyxz:Artifact_tool_contract
    type: Artifact
    name: core/tool.contract
    path: core/tool.contract
    role: Pin clear/tput/git + shadow warn; not every binary
    source_refs:
      - core/tool.contract
      - PLUGIN.md

  # --- PATH public API ---
  - id: shellyxz:Fn_path_contract_apply
    type: Function
    name: path_contract_apply
    export: true
    file: core/path-resolve.sh
    signature: path_contract_apply [--phase NAME]
    source_refs:
      - core/path-resolve.sh
      - core/env.sh

  - id: shellyxz:Fn_path_contract_apply_project
    type: Function
    name: path_contract_apply_project
    export: true
    file: core/path-resolve.sh
    signature: path_contract_apply_project CONTRACT_FILE
    source_refs:
      - core/path-resolve.sh
      - bin/path-contract-project.sh

  - id: shellyxz:Fn_path_contract_reassert
    type: Function
    name: path_contract_reassert
    export: true
    file: core/path-resolve.sh
    signature: path_contract_reassert
    source_refs:
      - core/path-resolve.sh
      - templates/zshrc

  - id: shellyxz:Fn_path_contract_verify
    type: Function
    name: path_contract_verify
    export: true
    file: core/path-resolve.sh
    signature: path_contract_verify
    source_refs:
      - core/path-resolve.sh
      - bin/check-shell.sh

  - id: shellyxz:Fn_path_contract_apply_core_only
    type: Function
    name: path_contract_apply_core_only
    export: true
    file: core/path-resolve.sh
    signature: path_contract_apply_core_only — skips local overlay (strict PATH)
    source_refs:
      - core/path-resolve.sh
      - PLUGIN.md

  - id: shellyxz:Fn_path_prepend
    type: Function
    name: path_prepend
    export: true
    file: core/path.sh
    signature: path_prepend DIRECTORY
    source_refs:
      - core/path.sh
      - core/path-resolve.sh

  # --- Invariants ---
  - id: shellyxz:Inv_local_wins_core
    type: Invariant
    name: local wins core on which
    severity: error
    check_ref: bin/check-shell.sh path contract overlay order
    source_refs:
      - arch-design/architecture.md
      - bin/check-shell.sh

  - id: shellyxz:Inv_direnv_owns_project
    type: Invariant
    name: direnv owns project PATH
    severity: error
    fused_summary: Project PATH via direnv + phase:project; .envrc must not rebuild full PATH
    source_refs:
      - arch-design/architecture.md
      - arch-design/shell.md

  - id: shellyxz:Inv_reassert_strips_junk
    type: Invariant
    name: path_contract_reassert at zshrc tail
    severity: error
    fused_summary: Reapplies core+local phases; strips deny patterns (e.g. /condabin) again
    source_refs:
      - templates/zshrc
      - arch-design/architecture.md

  - id: shellyxz:Inv_kernel_survives_plugin_delete
    type: Invariant
    name: kernel works if plugin deleted
    severity: error
    source_refs:
      - PLUGIN.md
      - arch-design/test-of-travelled-time-from-future.md

  # --- Verification bridge (SN-O1) ---
  - id: shellyxz:VerificationBridge
    type: Domain
    name: Verification Bridge
    subgraph: verify
    stability_score: 88
    fused_summary: >
      ab/av/at verbs delegate to plugin scripts via verification_script_path;
      bin shims keep stable entrypoints; cockpit-mcp headless parity;
      per-repo cockpit.yaml manifests.
    source_refs:
      - arch-design/VERIFICATION.md
      - plugins/verification/README.md
      - core/functions.sh

  - id: shellyxz:Verb_ab
    type: Concept
    name: ab (agent build)
    syntax: "alias ab='agent_build'"
    subgraph: verify
    source_refs:
      - core/aliases.sh
      - core/functions.sh

  - id: shellyxz:Verb_av
    type: Concept
    name: av (agent verify)
    syntax: "alias av='agent_verify'"
    subgraph: verify
    source_refs:
      - core/aliases.sh
      - core/functions.sh

  - id: shellyxz:Verb_at
    type: Concept
    name: at (agent test)
    syntax: "alias at='agent_test'"
    subgraph: verify
    source_refs:
      - core/aliases.sh
      - core/functions.sh

  - id: shellyxz:Concept_SHELL_AGENT_STRICT_PATH
    type: Concept
    name: SHELL_AGENT_STRICT_PATH
    syntax: "SHELL_AGENT_STRICT_PATH=1 or ab --strict — core-only PATH in agent pane"
    subgraph: verify
    source_refs:
      - PLUGIN.md
      - plugins/verification/lib/verify-launch.sh

  - id: shellyxz:Artifact_cockpit_yaml
    type: Artifact
    name: cockpit.yaml
    path: .agents/verification/cockpit.yaml
    role: Per-repo verify/test manifest (host-agnostic schema)
    subgraph: verify
    source_refs:
      - arch-design/VERIFICATION.md
      - .agents/verification/cockpit.yaml

  - id: shellyxz:Artifact_plugins_verification
    type: Artifact
    name: plugins/verification/
    path: plugins/verification
    role: Verification plugin tree (bin, lib, data, conf)
    subgraph: verify
    source_refs:
      - plugins/verification/README.md
      - PLUGIN.md

  - id: shellyxz:Artifact_shim_agent_build
    type: Artifact
    name: bin/agent-build-layout.sh
    path: bin/agent-build-layout.sh
    role: Stable shim → plugins/verification/bin/
    subgraph: verify
    source_refs:
      - bin/agent-build-layout.sh
      - plugins/verification/README.md

  - id: shellyxz:Artifact_shim_agent_verify
    type: Artifact
    name: bin/agent-verify-layout.sh
    path: bin/agent-verify-layout.sh
    role: Stable shim → plugins/verification/bin/
    subgraph: verify
    source_refs:
      - bin/agent-verify-layout.sh
      - plugins/verification/README.md

  - id: shellyxz:Artifact_shim_agent_test
    type: Artifact
    name: bin/agent-test-layout.sh
    path: bin/agent-test-layout.sh
    role: Stable shim → plugins/verification/bin/
    subgraph: verify
    source_refs:
      - bin/agent-test-layout.sh
      - plugins/verification/README.md

  - id: shellyxz:Artifact_cockpit_mcp
    type: Artifact
    name: bin/cockpit-mcp.sh
    path: bin/cockpit-mcp.sh
    role: Headless verify/test/scan (MCP hosts)
    subgraph: verify
    source_refs:
      - plugins/verification/bin/cockpit-mcp.sh
      - arch-design/VERIFICATION.md

  - id: shellyxz:Fn_verification_script_path
    type: Function
    name: verification_script_path
    export: false
    file: core/lib.sh
    signature: verification_script_path SCRIPT — plugin bin, then shim
    subgraph: verify
    source_refs:
      - core/lib.sh
      - templates/core/lib.sh

  - id: shellyxz:Fn_verification_lib_dir
    type: Function
    name: verification_lib_dir
    export: false
    file: core/lib.sh
    signature: verification_lib_dir — plugin lib directory
    subgraph: verify
    source_refs:
      - core/lib.sh
      - templates/core/lib.sh

  - id: shellyxz:Fn_agent_build
    type: Function
    name: agent_build
    export: true
    file: core/functions.sh
    signature: agent_build — tmux build layout (ab)
    subgraph: verify
    source_refs:
      - core/functions.sh
      - plugins/verification/bin/agent-build-layout.sh

  - id: shellyxz:Fn_agent_verify
    type: Function
    name: agent_verify
    export: true
    file: core/functions.sh
    signature: agent_verify — tmux verify layout (av)
    subgraph: verify
    source_refs:
      - core/functions.sh
      - plugins/verification/bin/agent-verify-layout.sh

  - id: shellyxz:Fn_agent_test
    type: Function
    name: agent_test
    export: true
    file: core/functions.sh
    signature: agent_test — tmux test layout (at)
    subgraph: verify
    source_refs:
      - core/functions.sh
      - plugins/verification/bin/agent-test-layout.sh

  - id: shellyxz:Env_SHELL_VERIFICATION_ROOT
    type: Concept
    name: SHELL_VERIFICATION_ROOT
    syntax: "export SHELL_VERIFICATION_ROOT=$SHELL_ROOT/plugins/verification"
    subgraph: verify
    source_refs:
      - core/env.sh
      - templates/core/env.sh

  - id: shellyxz:Env_SHELL_VERIFICATION_BIN
    type: Concept
    name: SHELL_VERIFICATION_BIN
    syntax: "export SHELL_VERIFICATION_BIN=$SHELL_VERIFICATION_ROOT/bin"
    subgraph: verify
    source_refs:
      - core/env.sh
      - templates/core/env.sh

  - id: shellyxz:Env_SHELL_VERIFICATION_LIB
    type: Concept
    name: SHELL_VERIFICATION_LIB
    syntax: "export SHELL_VERIFICATION_LIB=$SHELL_VERIFICATION_ROOT/lib"
    subgraph: verify
    source_refs:
      - core/env.sh
      - templates/core/env.sh

edges:
  - { from: shellyxz:Kernel, to: shellyxz:PathContractDomain, type: owns }
  - { from: shellyxz:Kernel, to: shellyxz:LoadOrder, type: owns }
  - { from: shellyxz:VerificationPlugin, to: shellyxz:Kernel, type: dependsOn, note: calls PublicHooks only }
  - { from: shellyxz:Kernel, to: shellyxz:VerificationPlugin, type: mustNot, note: kernel must not require plugin }
  - { from: shellyxz:Kernel, to: shellyxz:PublicHook_verify_workflow_root, type: owns }
  - { from: shellyxz:Kernel, to: shellyxz:PublicHook_SHELL_ROOT, type: owns }
  - { from: shellyxz:Kernel, to: shellyxz:PublicHook_detect_editor_terminal, type: owns }
  - { from: shellyxz:PathContractDomain, to: shellyxz:PathContract, type: owns }
  - { from: shellyxz:PathContract, to: shellyxz:PathPhase, type: owns }
  - { from: shellyxz:PathPhase, to: shellyxz:ContractLine_prepend, type: owns }
  - { from: shellyxz:PathPhase, to: shellyxz:ContractLine_append, type: owns }
  - { from: shellyxz:PathPhase, to: shellyxz:ContractLine_deny, type: owns }
  - { from: shellyxz:ContractLine_prepend, to: shellyxz:EnvironmentGate, type: resolvesTo }
  - { from: shellyxz:ContractLine_prepend, to: shellyxz:ReadabilityLexicon, type: usesLexicon }
  - { from: shellyxz:ContractLine_deny, to: shellyxz:ReadabilityLexicon, type: usesLexicon }
  - { from: shellyxz:PathContractDomain, to: shellyxz:Artifact_core_path_contract, type: owns }
  - { from: shellyxz:PathContractDomain, to: shellyxz:Artifact_local_path_contract, type: owns }
  - { from: shellyxz:PathContractDomain, to: shellyxz:Artifact_project_path_contract, type: owns }
  - { from: shellyxz:PathContractDomain, to: shellyxz:Artifact_tool_contract, type: owns }
  - { from: shellyxz:Fn_path_contract_apply, to: shellyxz:Artifact_core_path_contract, type: resolvesTo }
  - { from: shellyxz:Fn_path_contract_apply, to: shellyxz:Artifact_local_path_contract, type: resolvesTo }
  - { from: shellyxz:Fn_path_contract_apply_project, to: shellyxz:Artifact_project_path_contract, type: resolvesTo }
  - { from: shellyxz:Inv_local_wins_core, to: shellyxz:Artifact_local_path_contract, type: enforces }
  - { from: shellyxz:Inv_direnv_owns_project, to: shellyxz:Artifact_project_path_contract, type: enforces }
  - { from: shellyxz:Inv_reassert_strips_junk, to: shellyxz:Fn_path_contract_reassert, type: enforces }
  - { from: shellyxz:Inv_kernel_survives_plugin_delete, to: shellyxz:Kernel, type: enforces }
  - { from: shellyxz:LoadOrder, to: shellyxz:Fn_path_contract_apply, type: appliesBefore }
  - { from: shellyxz:LoadOrder, to: shellyxz:Fn_path_contract_reassert, type: appliesBefore }
  - { from: shellyxz:KernelPluginBoundary, to: shellyxz:Kernel, type: documentedIn, note: PLUGIN.md }
  - { from: shellyxz:KernelPluginBoundary, to: shellyxz:VerificationPlugin, type: documentedIn, note: PLUGIN.md }
  - { from: shellyxz:PathContractDomain, to: shellyxz:KernelPluginBoundary, type: documentedIn, note: architecture.md PATH table }
  - { from: shellyxz:VerificationPlugin, to: shellyxz:VerificationBridge, type: owns }
  - { from: shellyxz:VerificationBridge, to: shellyxz:Verb_ab, type: owns }
  - { from: shellyxz:VerificationBridge, to: shellyxz:Verb_av, type: owns }
  - { from: shellyxz:VerificationBridge, to: shellyxz:Verb_at, type: owns }
  - { from: shellyxz:Verb_ab, to: shellyxz:Fn_agent_build, type: resolvesTo }
  - { from: shellyxz:Verb_av, to: shellyxz:Fn_agent_verify, type: resolvesTo }
  - { from: shellyxz:Verb_at, to: shellyxz:Fn_agent_test, type: resolvesTo }
  - { from: shellyxz:Fn_agent_build, to: shellyxz:Fn_verification_script_path, type: resolvesTo }
  - { from: shellyxz:Fn_agent_verify, to: shellyxz:Fn_verification_script_path, type: resolvesTo }
  - { from: shellyxz:Fn_agent_test, to: shellyxz:Fn_verification_script_path, type: resolvesTo }
  - { from: shellyxz:Fn_verification_script_path, to: shellyxz:Artifact_plugins_verification, type: resolvesTo }
  - { from: shellyxz:Fn_verification_lib_dir, to: shellyxz:Artifact_plugins_verification, type: resolvesTo }
  - { from: shellyxz:VerificationBridge, to: shellyxz:Artifact_cockpit_yaml, type: documentedIn, note: per-repo manifest }
  - { from: shellyxz:VerificationBridge, to: shellyxz:Artifact_cockpit_mcp, type: owns }
  - { from: shellyxz:VerificationBridge, to: shellyxz:Concept_SHELL_AGENT_STRICT_PATH, type: owns }
  - { from: shellyxz:Concept_SHELL_AGENT_STRICT_PATH, to: shellyxz:Fn_agent_build, type: enforces }
  - { from: shellyxz:VerificationBridge, to: shellyxz:Env_SHELL_VERIFICATION_ROOT, type: owns }
  - { from: shellyxz:VerificationBridge, to: shellyxz:Env_SHELL_VERIFICATION_BIN, type: owns }
  - { from: shellyxz:VerificationBridge, to: shellyxz:Env_SHELL_VERIFICATION_LIB, type: owns }
  - { from: shellyxz:Artifact_shim_agent_build, to: shellyxz:Artifact_plugins_verification, type: resolvesTo }
  - { from: shellyxz:Artifact_shim_agent_verify, to: shellyxz:Artifact_plugins_verification, type: resolvesTo }
  - { from: shellyxz:Artifact_shim_agent_test, to: shellyxz:Artifact_plugins_verification, type: resolvesTo }
  - { from: shellyxz:VerificationBridge, to: shellyxz:KernelPluginBoundary, type: documentedIn, note: VERIFICATION.md }
